version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptoalarm-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=cryptoalarm;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - TZ=Europe/Istanbul
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure
    networks:
      - cryptoalarm-network

  priceworker:
    build:
      context: .
      dockerfile: Dockerfile.priceworker
    container_name: cryptoalarm-priceworker
    environment:
      - ApiSettings__BaseUrl=http://api:8080
      - TZ=Europe/Istanbul
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure
    networks:
      - cryptoalarm-network

  notificationworker:
    build:
      context: .
      dockerfile: Dockerfile.notificationworker
    container_name: cryptoalarm-notificationworker
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=cryptoalarm;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - TZ=Europe/Istanbul
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - cryptoalarm-network

  db:
    image: postgres:16-alpine
    container_name: cryptoalarm-db
    environment:
      POSTGRES_DB: cryptoalarm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cryptoalarm-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.18
    container_name: cryptoalarm-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - cryptoalarm-network

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.18
    container_name: cryptoalarm-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - cryptoalarm-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cryptoalarm-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cryptoalarm-network

volumes:
  postgres_data:
  elasticsearch_data:
  rabbitmq_data:

networks:
  cryptoalarm-network:
    driver: bridge
